name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .  # editable install so `src` package is importable

      - name: Unit tests (no LLM calls)
        run: pytest -m "not integration" --tb=short -q
        env:
          # Dummy key so config.py doesn't fail; no real LLM calls in unit tests
          DEEPSEEK_API_KEY: "sk-placeholder-for-ci"

      - name: Golden dataset evaluation
        run: python scripts/evaluate.py --threshold 0.85 --json
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Lint check (black)
        run: |
          pip install black
          black --check --diff src/ tests/ scripts/
